server:
  port: 8080

spring:
  profiles:
    active: dev   #记得要创建一个application-dev.yml，把本yml里面的占位符所指的真实值写到dev.yml里面。
  main:
    allow-circular-references: true
  datasource:
    # 指定连接池类型为 Druid
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: ${sky.datasource.driver-class-name}
    url: jdbc:mysql://${sky.datasource.host}:${sky.datasource.port}/${sky.datasource.database}?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&useSSL=false&allowPublicKeyRetrieval=true
    username: ${sky.datasource.username}
    password: ${sky.datasource.password}
    druid:
      # Druid 特有扩展配置
      initial-size: 5
      max-active: 20
      min-idle: 5
      max-wait: 60000

  data:
    redis:
      host: ${sky.redis.host}
      port: ${sky.redis.port}
      password: ${sky.redis.password}
      database: ${sky.redis.database}


mybatis:
  # mapper配置文件路径
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.sky.entity
  configuration:
    # 开启驼峰命名
    map-underscore-to-camel-case: true

logging:
  level:
    com:
      sky:
        mapper: debug
        service: info
        controller: info

sky:
  datasource:
    driver-class-name: ${SKY_DATASOURCE_DRIVER}
    host: ${SKY_DATASOURCE_HOST}
    port: ${SKY_DATASOURCE_PORT}
    database: ${SKY_DATASOURCE_DATABASE}
    username: ${SKY_DATASOURCE_USERNAME}
    password: ${SKY_DATASOURCE_PASSWORD}

  redis:
    host: localhost
    port: 6379
    password:
    database: 0

  jwt:
    # 管理端 JWT 配置
    admin-secret-key: ${sky.jwt.admin-secret-key}
    admin-ttl: 6048000000
    admin-token-name: token
    # 用户端 JWT 配置
    user-secret-key: ${sky.jwt.user-secret-key}
    user-ttl: 6048000000
    user-token-name: authentication

  alioss:
    endpoint: oss-cn-beijing.aliyuncs.com
    access-key-id: ${sky.alioss.access-key-id}
    access-key-secret: ${sky.alioss.access-key-secret}
    bucket-name: ${sky.alioss.bucket-name}

  wechat:
    appid: ${sky.wechat.appid}
    secret: ${sky.wechat.secret}
    mchid: 1234567890
    mchSerialNo: 1234567890ABCDEF1234567890ABCDEF
    privateKeyFilePath: F:/Code/Java/waimai/apiclient_key.pem
    apiV3Key: 1234567890abcdef1234567890abcdef
    weChatPayCertFilePath: F:/Code/Java/waimai/apiclient_cert.pem
    notifyUrl: http://localhost:8080/notify
    refundNotifyUrl: http://localhost:8080/refund/notify

  shop:
    address: "北京市海淀区"

  baidu:
    ak: "dummy_ak"

  # Knife4j 4.5.0 (OpenAPI 3) 专用配置
  knife4j:
    enable: true
    openapi:
      title: "苍穹外卖项目接口文档"
      description: "基于 Spring Boot 4(4.0.5) + JDK 21(21.0.11) 的现代化重构版"
      group:
        default:
          group-name: 管理端接口
          api-package: com.sky.controller.admin