server:
  port: 8080

spring:
  main:
    allow-circular-references: true
  datasource:
    # 指定连接池类型为 Druid
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: ${sky.datasource.driver-class-name}
    url: jdbc:mysql://${sky.datasource.host}:${sky.datasource.port}/${sky.datasource.database}?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&useSSL=false&allowPublicKeyRetrieval=true
    username: ${sky.datasource.username}
    password: ${sky.datasource.password}
    druid:
      # Druid 特有扩展配置
      initial-size: 5
      max-active: 20
      min-idle: 5
      max-wait: 60000

  redis:
    host: ${sky.redis.host}
    port: ${sky.redis.port}
    password: ${sky.redis.password}
    database: ${sky.redis.database}

mybatis:
  # mapper配置文件路径
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.sky.entity
  configuration:
    # 开启驼峰命名
    map-underscore-to-camel-case: true

logging:
  level:
    com:
      sky:
        mapper: debug
        service: info
        controller: info

# -------------------------------------------------------------------
# 自定义配置块（存储真实变量值）
# -------------------------------------------------------------------
sky:
  datasource:
    # 这里必须是真实值，不能写占位符本身，否则会导致死循环报错
    driver-class-name: com.mysql.cj.jdbc.Driver
    host: localhost
    port: 3306
    database: sky_take_out
    username: root
    password: 1234

  redis:
    host: localhost
    port: 6379
    password:
    database: 0

  jwt:
    # 管理端 JWT 配置
    admin-secret-key: "mySuperSecretKeyForJwtThatIsAtLeast32Chars"
    admin-ttl: 7200000
    admin-token-name: token
    # 用户端 JWT 配置
    user-secret-key: "anotherLongSecretKeyForUserJwtAtLeast32Chars"
    user-ttl: 7200000
    user-token-name: authentication

  alioss:
    endpoint: oss-cn-beijing.aliyuncs.com
    access-key-id: LTAI5tMr9nV2F6SmeFT55wmK
    access-key-secret: Faj2o4INrW3fkDhhi5gVIV2DtOz5mc
    bucket-name: ive-won

  wechat:
    appid: wx1234567890abcdef
    secret: 1234567890abcdef1234567890abcdef
    mchid: 1234567890
    mchSerialNo: 1234567890ABCDEF1234567890ABCDEF
    privateKeyFilePath: F:/Code/Java/waimai/apiclient_key.pem
    apiV3Key: 1234567890abcdef1234567890abcdef
    weChatPayCertFilePath: F:/Code/Java/waimai/apiclient_cert.pem
    notifyUrl: http://localhost:8080/notify
    refundNotifyUrl: http://localhost:8080/refund/notify

