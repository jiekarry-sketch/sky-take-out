  # Knife4j 4.5.0 (OpenAPI 3) 专用配置
  knife4j:
    enable: true
    openapi:
      title: "苍穹外卖项目接口文档"
      description: "基于 Spring Boot 4 + JDK 25 的现代化重构版"
      group:
        default:
          group-name: 管理端接口
          api-package: com.sky.controller.admin